{{define "panel"}}
<div class="mt-3 rounded-md border p-3 {{if .Error}}border-rose-300 bg-rose-50 text-rose-900{{else}}border-stone-300 bg-white text-stone-900{{end}}">
  <h3 class="mb-2 text-sm font-semibold">{{.Title}}</h3>
  <pre class="font-mono text-xs whitespace-pre-wrap break-words">{{.Body}}</pre>
</div>
{{end}}
