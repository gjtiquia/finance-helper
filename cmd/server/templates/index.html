{{define "index"}}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>finance-helper</title>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <style>
    :root {
      --bg: #f4f1ea;
      --card: #fffdf9;
      --text: #21201c;
      --muted: #6a6458;
      --accent: #126e61;
      --error: #8f2d2d;
      --border: #d9d2c5;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Iowan Old Style", "Palatino Linotype", Palatino, serif;
      background: radial-gradient(circle at top right, #efe6d9, var(--bg));
      color: var(--text);
    }
    .shell { max-width: 980px; margin: 0 auto; padding: 24px 16px 48px; }
    h1 { margin: 0 0 8px; font-size: 2rem; }
    p { margin: 0; color: var(--muted); }
    .grid {
      margin-top: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 14px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      box-shadow: 0 8px 22px rgba(50, 40, 20, 0.08);
    }
    h2 { margin: 0 0 10px; font-size: 1.1rem; }
    label { display: block; margin: 10px 0 6px; font-size: 0.92rem; }
    input, select, button {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px;
      font: inherit;
      background: #fff;
      color: inherit;
    }
    button {
      margin-top: 12px;
      background: linear-gradient(120deg, #0f6a5e, var(--accent));
      color: #fff;
      border: none;
      cursor: pointer;
      font-weight: 600;
    }
    .panel {
      margin-top: 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px;
      background: #fff;
    }
    .panel.error {
      border-color: #d9a4a4;
      color: var(--error);
      background: #fff6f6;
    }
    .panel h3 { margin: 0 0 8px; font-size: 1rem; }
    pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: Menlo, Consolas, monospace;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
<main class="shell">
  <h1>finance-helper</h1>
  <p>Minimal web frontend using Go templates and htmx.</p>

  <div class="grid">
    <section class="card">
      <h2>Connect</h2>
      <form hx-post="/ui/connect" hx-target="#connect-result" hx-swap="innerHTML">
        <label for="server_url">Server URL</label>
        <input id="server_url" name="server_url" value="{{.SuggestedServerURL}}" required>
        <button type="submit">Connect</button>
      </form>
      <div id="connect-result">
        {{if .ConnectedServerURL}}
          <div class="panel"><h3>Connect</h3><pre>Connected to {{.ConnectedServerURL}}</pre></div>
        {{end}}
      </div>
    </section>

    <section class="card">
      <h2>Status</h2>
      <button hx-get="/ui/status" hx-target="#status-result" hx-swap="innerHTML">Check Status</button>
      <div id="status-result"></div>
    </section>

    <section class="card">
      <h2>PDF Upload</h2>
      <form hx-post="/ui/pdf/upload" hx-target="#upload-result" hx-swap="innerHTML" enctype="multipart/form-data">
        <label for="file">Local PDF</label>
        <input id="file" type="file" name="file" accept="application/pdf" required>
        <label for="upload_path">Server Relative Path</label>
        <input id="upload_path" name="path" placeholder="statements/chase/2026-03.pdf" required>
        <button type="submit">Upload</button>
      </form>
      <div id="upload-result"></div>
    </section>

    <section class="card">
      <h2>PDF List</h2>
      <button hx-get="/ui/pdf/list" hx-target="#list-result" hx-swap="innerHTML">List PDFs</button>
      <div id="list-result"></div>
    </section>

    <section class="card">
      <h2>PDF Parse</h2>
      <form hx-post="/ui/pdf/parse" hx-target="#parse-result" hx-swap="innerHTML">
        <label for="parser">Parser</label>
        <select id="parser" name="parser">
          <option value="raw">raw</option>
          <option value="raw-json">raw-json</option>
        </select>
        <label for="parse_path">Server Relative Path</label>
        <input id="parse_path" name="path" placeholder="statements/chase/2026-03.pdf" required>
        <button type="submit">Parse</button>
      </form>
      <div id="parse-result"></div>
    </section>
  </div>
</main>
</body>
</html>
{{end}}
